name: Make Pre release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-preview.[0-9]+'

jobs:
  release-for-github:
    name: "Preview Release for GitHub"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 17

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build preview APKs
        run: ./gradlew assembleStandardPreview --stacktrace

      - name: Get tag name
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VERSION_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Verify build output
        run: |
          PREVIEW_DIR="app/build/outputs/apk/standard/preview"
          if [ ! -d "$PREVIEW_DIR" ]; then
            echo "Preview directory does not exist!"
            find app/build/outputs -name "*.apk" -type f
            exit 1
          fi
          ls -lah "$PREVIEW_DIR"

      - name: Sign APKs
        run: |
          set -e
          PREVIEW_DIR="app/build/outputs/apk/standard/preview"
          
          if [ -z "${{ secrets.SIGNING_KEYSTORE }}" ]; then
            echo "SIGNING_KEYSTORE secret is not available. Skipping signing."
            exit 0
          fi
          
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > release.keystore
          
          APK_COUNT=$(find "$PREVIEW_DIR" -name "app-standard-*-preview-unsigned.apk" -type f | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "No unsigned preview APK files found"
            ls -lah "$PREVIEW_DIR"
            rm -f release.keystore
            exit 1
          fi
          
          find "$PREVIEW_DIR" -name "app-standard-*-preview-unsigned.apk" -type f | while read -r apk; do
            signed_apk="${apk/-unsigned/}"
          
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
              --ks release.keystore \
              --ks-key-alias "${{ secrets.SIGNING_KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.SIGNING_STORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              --out "$signed_apk" \
              "$apk"
          
            $ANDROID_HOME/build-tools/34.0.0/apksigner verify "$signed_apk"
            rm "$apk"
          done
          
          rm -f release.keystore
          ls -lh "$PREVIEW_DIR"/app-standard-*-preview.apk

      - name: Copy built artifacts
        run: |
          set -e
          mkdir -p preview
          declare -a apks=("universal" "arm64-v8a" "armeabi-v7a" "x86" "x86_64")

          for abi in "${apks[@]}"; do
            src="app/build/outputs/apk/standard/preview/app-standard-${abi}-preview.apk"
            dest="preview/mpvRx-zh-preview-${abi}-${{ env.VERSION_TAG }}.apk"
            if [ -f "$src" ]; then
              cp "$src" "$dest"
              sha=$(sha256sum "$dest" | awk '{ print $1 }')
              echo "apk_${abi//-/_}_sha256=$sha" >> $GITHUB_ENV
            fi
          done

      - name: Prepare pre-release notes
        run: |
          set -euo pipefail
          
          if [ -f "CHANGELOG.md" ]; then
            python3 - <<'PY'
          from pathlib import Path
          
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          section = []
          in_latest = False
          
          for line in changelog:
              if line.startswith("## "):
                  if in_latest:
                      break
                  in_latest = True
              if in_latest:
                  section.append(line)
          
          latest = "\n".join(section).strip()
          if not latest:
              latest = "预览版更新"
          
          Path("pre-release-notes.md").write_text(latest + "\n", encoding="utf-8")
          PY
          else
            echo "## MpvRx 中文版 ${{ env.VERSION_TAG }}" > pre-release-notes.md
            echo "" >> pre-release-notes.md
            echo "预览版，包含最新功能和翻译更新。" >> pre-release-notes.md
          fi
          
          cat >> pre-release-notes.md <<EOF
          
          ---
          ### 校验和
          
          | 架构 | SHA-256 |
          | ---- | ------- |
          | arm64-v8a | ${apk_arm64_v8a_sha256:-未构建} |
          | armeabi-v7a | ${apk_armeabi_v7a_sha256:-未构建} |
          | Universal | ${apk_universal_sha256:-未构建} |
          | x86 | ${apk_x86_sha256:-未构建} |
          | x86_64 | ${apk_x86_64_sha256:-未构建} |
          
          EOF

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: "MpvRx 中文版 ${{ env.VERSION_TAG }}"
          body_path: pre-release-notes.md
          generate_release_notes: true
          files: |
            preview/mpvRx-zh-preview-universal-${{ env.VERSION_TAG }}.apk
            preview/mpvRx-zh-preview-arm64-v8a-${{ env.VERSION_TAG }}.apk
            preview/mpvRx-zh-preview-armeabi-v7a-${{ env.VERSION_TAG }}.apk
            preview/mpvRx-zh-preview-x86-${{ env.VERSION_TAG }}.apk
            preview/mpvRx-zh-preview-x86_64-${{ env.VERSION_TAG }}.apk

          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
